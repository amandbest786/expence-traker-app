<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expence page</title>
</head>
<body>
    <form onsubmit="expence(event)">
       Choose an amount: <input type="number" name="amount" placeholder="Amount" required>
       Choose a description: <input type="text" name="description" placeholder="Description" required>
        Choose a category: 
        <select name="category" required>
            <option value="">Select a category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Other">Other</option>
        </select>
        <button type="submit">Add Expence</button>
    </form>

    <ul id="expenseList"></ul>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.8/axios.min.js" ></script>
    <script src="expence.js"></script>

</body>
</html>
