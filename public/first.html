<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup page</title>
</head>
<body>
    <form onsubmit="signup(event)">
       Enter your name: <input type="text" name="name" placeholder="Enter your name">
       Enter your email: <input type="email" name="email" placeholder="Enter your email">
       Enter your password: <input type="password" name="password" placeholder="Enter your password">
        <button type="submit">signup</button>
    </form>

    <p>Already have an account? 
   <a href="login.html">Login</a>
  </p>

   <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.8/axios.min.js" ></script>
    <script src="index.js"></script>
</body>
</html>
